# ── Dalios Trading System — Docker Compose ───────────────────
# Usage:
#   docker compose up              # SQLite (default, single-user)
#   docker compose --profile db up # PostgreSQL (multi-user, production)

services:
  dalios:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - dalios-data:/app/data
      - dalios-logs:/app/logs
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/storage/trading.db}
    restart: unless-stopped

  # Optional: PostgreSQL for production multi-user deployments
  postgres:
    image: postgres:16-alpine
    profiles: ["db"]
    environment:
      POSTGRES_DB: dalios
      POSTGRES_USER: dalios
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dalios"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dalios-data:
  dalios-logs:
  postgres-data:
