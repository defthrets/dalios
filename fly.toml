# Fly.io deployment config for Dalios Trading System
# Deploy: fly launch --no-deploy && fly secrets set FINNHUB_API_KEY=xxx && fly deploy

app = "dalios"
primary_region = "syd"  # Sydney — closest to ASX

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DATABASE_URL = "sqlite:///data/storage/trading.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false    # Keep running for scheduled scans
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "dalios_data"
  destination = "/app/data"
